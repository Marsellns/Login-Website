<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a secure account">
    <title>Register — Secure Auth</title>
    <!--
    ╔══════════════════════════════════════════════════════════════════╗
    ║  XSS SECURITY NOTES                                            ║
    ║                                                                  ║
    ║  • All template variables are AUTO-ESCAPED by Django.          ║
    ║  • The |safe filter is STRICTLY FORBIDDEN in this template.    ║
    ║  • User input (username, email) displayed in the form values   ║
    ║    is escaped to &lt;, &gt;, &amp;, &quot;, &#x27;            ║
    ║  • CSRF token is included via {% csrf_token %} for POST.       ║
    ╚══════════════════════════════════════════════════════════════════╝
    -->
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .auth-card h1 {
            text-align: center;
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-card .subtitle {
            text-align: center;
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            color: #bbb;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.25);
        }

        .btn-primary {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:active { transform: scale(0.98); }

        .messages {
            list-style: none;
            margin-bottom: 1.25rem;
        }

        .messages li {
            padding: 0.65rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .messages .error {
            background: rgba(255, 82, 82, 0.15);
            border: 1px solid rgba(255, 82, 82, 0.3);
            color: #ff5252;
        }

        .messages .success {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #888;
        }

        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .security-badge {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #555;
        }

        .security-badge span {
            color: #4caf50;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Create Account</h1>
        <p class="subtitle">Join us securely</p>

        <!-- ─── Django Messages (auto-escaped, XSS-safe) ─── -->
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            {# message.tags is auto-escaped. No |safe filter is used. #}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <!--
            CSRF PROTECTION:
            {% csrf_token %} injects a hidden input with a unique, per-session
            token. Django's CsrfViewMiddleware validates this token on every
            POST request. Without a valid token, the request is rejected with
            a 403 Forbidden response.
        -->
        <form method="POST" action="{% url 'register' %}" novalidate>
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username">Username</label>
                <!--
                    The value="{{ username|default:'' }}" is AUTO-ESCAPED by Django.
                    If a user submits: <script>alert('xss')</script>
                    Django renders it as: &lt;script&gt;alert(&#x27;xss&#x27;)&lt;/script&gt;
                    The browser displays the text literally — no script execution.
                -->
                <input type="text" id="id_username" name="username"
                       value="{{ username|default:'' }}"
                       autocomplete="username"
                       maxlength="150"
                       required>
            </div>

            <div class="form-group">
                <label for="id_email">Email</label>
                <!-- Same auto-escaping applies to the email value -->
                <input type="email" id="id_email" name="email"
                       value="{{ email|default:'' }}"
                       autocomplete="email"
                       maxlength="254"
                       required>
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                <!-- Password fields are NEVER pre-filled for security -->
                <input type="password" id="id_password" name="password"
                       autocomplete="new-password"
                       minlength="10"
                       required>
            </div>

            <div class="form-group">
                <label for="id_password_confirm">Confirm Password</label>
                <input type="password" id="id_password_confirm" name="password_confirm"
                       autocomplete="new-password"
                       minlength="10"
                       required>
            </div>

            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </p>

        <p class="security-badge">
            <span>🔒</span> Secured with Argon2 encryption &amp; TLS 1.3
        </p>
    </div>
</body>
</html>
