# =====================================================================
# SNORT CONFIGURATION FOR DJANGO SECURE AUTH
# Mode: IDS (Intrusion Detection System)
# Location: /etc/snort/snort.conf (Kali Linux)
# =====================================================================

# 1. NETWORK VARIABLES
# Sesuaikan IP dengan IP Kali Linux Anda (misal: 192.168.1.0/24 atau any)
ipvar HOME_NET any
ipvar EXTERNAL_NET any

# Define specific servers
ipvar HTTP_SERVERS $HOME_NET
ipvar SQL_SERVERS $HOME_NET
ipvar DNS_SERVERS $HOME_NET

# Define ports
portvar HTTP_PORTS [80,443,8000]
portvar SSH_PORTS 22

# 2. DECODER & PREPROCESSOR CONFIG
# HTTP Inspect: Mendeteksi anomali pada traffic HTTP
preprocessor http_inspect: global \
    iis_unicode_map unicode.map 1252
preprocessor http_inspect_server: server default \
    profile all \
    ports { 80 8080 8000 } \
    server_flow_depth 0 \
    client_flow_depth 0

# Stream5: TCP stream reassembly untuk mendeteksi attack yang di-split ke beberapa paket
preprocessor stream5_global: track_tcp yes, track_udp yes, track_icmp yes
preprocessor stream5_tcp: policy first, use_static_footprint_sizes
preprocessor stream5_udp: ignore_any_rules

# Frag3: IP defragmentation
preprocessor frag3_global: max_frags 65536
preprocessor frag3_engine: policy linux

# 3. OUTPUT CONFIGURATION
# Format output: fast (mudah dibaca manusia) dan diletakkan di /var/log/snort/
output alert_fast: /var/log/snort/alert
# Opsional: Unified2 format untuk tools external seperti Barnyard2
# output unified2: filename snort.log, limit 128

# 4. RULE INCLUDES
# Default rules path di Kali Linux biasanya di /etc/snort/rules/
var RULE_PATH /etc/snort/rules

# Include custom rules
include $RULE_PATH/local.rules
include $RULE_PATH/icmp.rules
include $RULE_PATH/portscan.rules
