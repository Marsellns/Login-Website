# ============================================================================
# Nginx Reverse Proxy Configuration — Production HTTPS
# ============================================================================
# This configuration:
#   1. Terminates TLS at Nginx (Let's Encrypt / Certbot certificates)
#   2. Redirects ALL HTTP traffic to HTTPS (port 80 → 443)
#   3. Proxies requests to Gunicorn running the Django app on 127.0.0.1:8000
#   4. Enforces modern TLS (1.2 & 1.3 only), HSTS, and security headers
#   5. Serves static files directly from Nginx for performance
#
# Deployment:
#   sudo ln -s /etc/nginx/sites-available/secure_auth /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

# ─── HTTP → HTTPS redirect (all traffic) ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect ALL HTTP requests to HTTPS with a 301 (permanent) redirect.
    # This ensures no unencrypted communication ever reaches the application.
    return 301 https://$host$request_uri;
}

# ─── HTTPS server block ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── Let's Encrypt (Certbot) SSL Certificate Paths ────────────────────
    # Generated via: sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
    # Certbot automatically provisions and renews certificates.
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ── TLS Protocol & Cipher Configuration ──────────────────────────────
    # Only allow TLS 1.2 and TLS 1.3 — all older protocols are insecure.
    ssl_protocols TLSv1.2 TLSv1.3;

    # Use server-preferred cipher order for stronger security
    ssl_prefer_server_ciphers on;

    # Modern cipher suite — excludes weak ciphers (RC4, 3DES, export ciphers)
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';

    # Enable OCSP Stapling for faster certificate validation
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # SSL session caching for performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Diffie-Hellman parameter for DHE ciphers (generate with: openssl dhparam -out /etc/ssl/dhparams.pem 4096)
    # ssl_dhparam /etc/ssl/dhparams.pem;

    # ── Security Headers ─────────────────────────────────────────────────
    # HSTS: Tell browsers to ONLY use HTTPS for 1 year, including subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # XSS filter (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy — don't leak full URLs to third-party sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy — restrict resource loading
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Permissions Policy — disable unnecessary browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── Static Files ─────────────────────────────────────────────────────
    # Serve static files directly from Nginx (bypass Gunicorn/Django)
    # Run: python manage.py collectstatic
    location /static/ {
        alias /var/www/secure_auth/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Reverse Proxy to Gunicorn ────────────────────────────────────────
    # Gunicorn runs the Django WSGI app on a local Unix socket or TCP port.
    # Start Gunicorn with:
    #   gunicorn secure_auth.wsgi:application \
    #     --bind 127.0.0.1:8000 \
    #     --workers 4 \
    #     --timeout 30 \
    #     --access-logfile /var/log/gunicorn/access.log \
    #     --error-logfile /var/log/gunicorn/error.log
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Limit request body size (prevent abuse)
        client_max_body_size 5M;
    }

    # ── Block access to hidden files (.env, .git, etc.) ──────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
